name: Build and Push Backend to GHCR

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ------------------------------------------------------------
      # 1. Checkout source code
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 2. Enable multi-architecture builds (ARM + AMD)
      # ------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------
      # 3. Login to GHCR
      # ------------------------------------------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------
      # 4. Build + Push multi-arch image (FIXED)
      #    Replaces: docker build + docker push
      # ------------------------------------------------------------
      - name: Set lowercase owner
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/rent-apart-backend:latest
          platforms: linux/amd64,linux/arm64

      # ------------------------------------------------------------
      # 5. Trigger infra deploy (self-hosted VM pulls new image)
      # ------------------------------------------------------------
      - name: Trigger infra deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_PAT }}" \
            https://api.github.com/repos/Dallss/rentapart-infra/dispatches \
            -d '{"event_type":"deploy"}'
